<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bumpy Ride — v8.2 Standart Harita Sürümü</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08); --accent: #7c6af7;
    --accent2: #3dd6ac; --accent3: #f7a26a; --text: #f0eeff;
    --text2: rgba(240,238,255,0.55); --text3: rgba(240,238,255,0.3);
    --danger: #f74a6a; --radius: 16px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; }
  .app { max-width: 520px; margin: 0 auto; padding: 20px 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .map-container { background: #eee; border-radius: var(--radius); height: 210px; margin: 16px 0; overflow: hidden; position: relative; }
  #map { width: 100%; height: 100%; }
  .ride-btn { padding: 16px; border: none; border-radius: 8px; font-weight: 600; width: 100%; cursor: pointer; }
  .btn-start { background: var(--accent2); color: #0a0a0f; }
  .btn-stop { background: var(--danger); color: #fff; }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div id="ride-badge">Hazır</div>
    <div class="map-container">
      <div id="map"></div>
    </div>
    <button class="ride-btn btn-start" id="btn-ride-toggle">Sürüşü Başlat</button>
  </div>
</div>

<script>
let map = null;
let livePolyline = null;

window.addEventListener('load', () => {
  // HARİTA AYARI: Sabah çalışan, en standart OSM bağlantısı
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9208, 32.8541], 13);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: ''
  }).addTo(map);

  livePolyline = L.polyline([], { color: '#7c6af7', weight: 6 }).addTo(map);
  
  document.getElementById('btn-ride-toggle').onclick = () => {
    alert("Buton aktif çalışıyor.");
  };
});
</script>
</body>
</html>
