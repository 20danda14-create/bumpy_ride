<html lang="tr">
<head>

<title>Bumpy Ride Pro — Gelişmiş Sürüş Analitiği</title>

<style>
  :root {
    --bg: #05050a;
    --surface: rgba(16, 16, 28, 0.75);
    --surface2: rgba(28, 28, 44, 0.6);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #8162ff;
    --accent-glow: rgba(129, 98, 255, 0.25);
    --accent2: #2ce5b4;
    --accent2-glow: rgba(44, 229, 180, 0.25);
    --accent3: #ff9f68;
    --text: #f5f5fa;
    --text2: rgba(245, 245, 250, 0.65);
    --text3: rgba(245, 245, 250, 0.35);
    --danger: #ff4a70;
    --danger-glow: rgba(255, 74, 112, 0.25);
    --mono: 'Space Mono', monospace;
    --sans: 'Plus Jakarta Sans', sans-serif;
    --radius: 24px;
    --radius-sm: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; letter-spacing: -0.01em; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(129, 98, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(129, 98, 255, 0.02) 1px, transparent 1px);
    background-size: 30px 30px; pointer-events: none; z-index: 0;
  }

  /* --- INTRO SCREEN --- */
  #intro-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .intro-logo-wrap { animation: introBumpy 1.2s ease-out infinite alternate; text-align: center; margin-bottom: 32px; }
  @keyframes introBumpy { 0% { transform: translateY(0); } 100% { transform: translateY(-6px); } }
  .intro-title { font-size: 44px; font-weight: 800; letter-spacing: -0.04em; background: linear-gradient(135deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .intro-subtitle { font-size: 11px; font-family: var(--mono); color: var(--accent2); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 8px; }
  .intro-loader-container { width: 160px; height: 3px; background: rgba(255, 255, 255, 0.04); border-radius: 10px; margin-top: 40px; position: relative; overflow: hidden; }
  .intro-loader-bar { position: absolute; height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); animation: fillLoader 1.6s ease forwards; }
  @keyframes fillLoader { 0% { width: 0%; } 100% { width: 100%; } }

  /* --- APPLICATION LAYOUT --- */
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { text-align: center; margin-bottom: 24px; }
  .logo { font-size: 11px; font-family: var(--mono); letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
  .title { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #ffffff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* Permission Screen */
  #permission-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .perm-card { background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 24px; width: 100%; text-align: center; box-shadow: 0 24px 50px rgba(0,0,0,0.5); }
  .perm-icon { width: 64px; height: 64px; border-radius: 20px; background: rgba(129, 98, 255, 0.1); border: 1px solid rgba(129, 98, 255, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; }
  .perm-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .perm-desc { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 24px; }
  .perm-btn { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px var(--accent-glow); }
  .perm-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(129, 98, 255, 0.4); }
