<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bumpy Ride — Sürüş Analitiği</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  body { background:#0a0a0f; color:#f0eeff; font-family:system-ui; margin:0; }
  .app { max-width:600px; margin:auto; padding:20px; }
  .header { text-align:center; margin-bottom:20px; }
  .title { font-size:28px; font-weight:800; color:#7c6af7; }
  .card { background:#12121a; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:16px; margin-bottom:16px; }
  .option-box { background:#1a1a26; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px; cursor:pointer; text-align:center; }
  .option-box.selected { border-color:#7c6af7; background:rgba(124,106,247,0.1); }
  .ride-btn { padding:12px; border:none; border-radius:8px; font-weight:600; cursor:pointer; margin-top:10px; width:100%; }
  .btn-start { background:#3dd6ac; color:#000; }
  .btn-stop { background:#f74a6a; color:#fff; }
  .btn-play { background:#7c6af7; color:#fff; }
  #map { height:250px; border-radius:8px; margin-top:12px; }
  .notice { font-size:12px; color:#3dd6ac; margin-top:8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">Bumpy Ride</div>
    <p>Sürüş Analitiği ve GPS Takibi</p>
  </div>

  <div class="card">
    <h3>1. Grafik Tipi</h3>
    <div style="display:flex; gap:10px;">
      <div class="option-box selected" id="opt-mesh" onclick="selectGraph('mesh')">🚗 Araç Animasyonu</div>
      <div class="option-box" id="opt-wave" onclick="selectGraph('wave')">📈 Dalga Grafiği</div>
    </div>
  </div>

  <div class="card">
    <h3>2. Araç Tipi</h3>
    <div style="display:flex; gap:10px;">
      <div class="option-box selected" id="opt-sedan" onclick="selectVehicle('sedan')">🚙 Sedan</div>
      <div class="option-box" id="opt-suv" onclick="selectVehicle('suv')">🚘 SUV</div>
    </div>
  </div>

  <div class="card">
    <h3>GPS & Harita</h3>
    <button class="ride-btn btn-start" onclick="startRide()">Başlat</button>
    <button class="ride-btn btn-stop" onclick="stopRide()">Durdur</button>
    <button class="ride-btn btn-play" onclick="playback()">Oynat</button>
    <div id="map"></div>
    <div class="notice" id="gps-status">📍 GPS durumu: bekleniyor...</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let selectedGraph = "mesh";
let selectedVehicle = "sedan";
let map, marker, watchId;

function selectGraph(type){
  selectedGraph = type;
  document.querySelectorAll('[id^="opt-"]').forEach(el=>el.classList.remove("selected"));
  document.getElementById("opt-"+type).classList.add("selected");
}

function selectVehicle(type){
  selectedVehicle = type;
  document.querySelectorAll('[id^="opt-"]').forEach(el=>el.classList.remove("selected"));
  document.getElementById("opt-"+type).classList.add("selected");
}

function initMap(lat=39.9334, lng=32.8597){ // Ankara default
  map = L.map('map').setView([lat,lng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
  }).addTo(map);
  marker = L.marker([lat,lng]).addTo(map).bindPopup("Başlangıç Noktası").openPopup();
}

function startRide(){
  if(!map){ initMap(); }
  if(navigator.geolocation){
    watchId = navigator.geolocation.watchPosition(pos=>{
      const {latitude, longitude} = pos.coords;
      marker.setLatLng([latitude,longitude]).bindPopup("Anlık Konum").openPopup();
      map.setView([latitude,longitude], 15);
      document.getElementById("gps-status").textContent = "📍 GPS aktif: "+latitude.toFixed(4)+", "+longitude.toFixed(4);
    }, err=>{
      document.getElementById("gps-status").textContent = "❌ GPS hatası: "+err.message;
    });
  } else {
    document.getElementById("gps-status").textContent = "❌ Tarayıcı GPS desteklemiyor.";
  }
}

function stopRide(){
  if(watchId){ navigator.geolocation.clearWatch(watchId); }
  document.getElementById("gps-status").textContent = "⏹️ GPS durduruldu.";
}

function playback(){
  document.getElementById("gps-status").textContent = "▶️ Sürüş oynatımı (simülasyon) başlatıldı.";
}
</script>
</body>
</html>
