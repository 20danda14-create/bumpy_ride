<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bumpy Ride — v6.8 Kesin Çözüm</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bumpy Ride">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #3dd6ac;
    --accent3: #f7a26a;
    --text: #f0eeff;
    --text2: rgba(240,238,255,0.55);
    --text3: rgba(240,238,255,0.3);
    --danger: #f74a6a;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }

  .app { max-width: 520px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { text-align: center; margin-bottom: 20px; }
  .logo { font-size: 11px; font-family: monospace; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; }
  .title { font-size: 28px; font-weight: 800; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-label { font-size: 11px; font-family: monospace; color: var(--text3); text-transform: uppercase; }
  .card-badge { font-size: 10px; font-family: monospace; padding: 3px 8px; border-radius: 4px; border: 1px solid; }
  .badge-active { color: var(--accent2); border-color: rgba(61,214,172,0.3); background: rgba(61,214,172,0.08); }
  .badge-warn { color: var(--accent3); border-color: rgba(247,162,106,0.3); background: rgba(247,162,106,0.08); }

  .db-value { font-size: 54px; font-family: monospace; font-weight: 700; line-height: 1; }
  
  .metrics-row-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 16px 0; }
  .metric-subbox { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; text-align: center; }
  .metric-subbox .m-lbl { font-size: 9px; font-family: monospace; color: var(--text3); text-transform: uppercase; }
  .metric-subbox .m-val { font-size: 13px; font-family: monospace; font-weight: 700; margin-top: 4px; }

  /* ARAÇ BAKIM PANELİ */
  .maintenance-box { background: linear-gradient(135deg, rgba(124,106,247,0.03), rgba(255,255,255,0.01)); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .maint-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .maint-input-group { display: flex; flex-direction: column; gap: 4px; }
  .maint-input-group label { font-size: 10px; font-family: monospace; color: var(--text2); text-transform: uppercase; }
  .maint-input-group input { background: var(--surface2); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: var(--radius-sm); font-family: monospace; font-size: 14px; text-align: center; }
  .maint-status-bar { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 12px; }

  /* İKAZ PANELİ */
  .alert-popup-box { background: rgba(247, 162, 106, 0.1); border: 1px solid var(--accent3); border-radius: var(--radius-sm); padding: 12px; margin: 12px 0; display: none; text-align: center; }
  .alert-popup-box.critical-alarm { background: rgba(247, 74, 106, 0.15); border: 1px solid var(--danger); animation: pulse-border 1.5s infinite; }
  .alert-popup-box h4 { font-size: 14px; font-weight: bold; margin-bottom: 4px; color: var(--accent3); }
  .alert-popup-box.critical-alarm h4 { color: var(--danger); }
  .alert-popup-box p { font-size: 12px; font-family: monospace; color: var(--text); }
  
  .map-container { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); height: 230px; margin: 16px 0; position: relative; overflow: hidden; z-index: 1; }
  #map { width: 100%; height: 100%; }

  /* TRAFİK RADARI PANELİ */
  .traffic-radar-box { background: rgba(247, 74, 106, 0.04); border: 1px solid rgba(247, 74, 106, 0.15); border-radius: var(--radius); padding: 16px; margin: 16px 0; display: none; }
  .radar-title { font-size: 12px; font-family: monospace; font-weight: bold; color: var(--danger); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .traffic-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .traffic-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 10px; border-radius: var(--radius-sm); display: flex; justify-content: space-between; align-items: center; }
