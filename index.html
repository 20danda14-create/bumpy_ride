<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bumpy Ride — Temiz Kararlı v6.0</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bumpy Ride">
<meta name="mobile-web-app-capable" content="yes">

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #3dd6ac;
    --accent3: #f7a26a;
    --text: #f0eeff;
    --text2: rgba(240,238,255,0.55);
    --text3: rgba(240,238,255,0.3);
    --danger: #f74a6a;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }

  .app { max-width: 520px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { text-align: center; margin-bottom: 20px; }
  .logo { font-size: 11px; font-family: monospace; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; }
  .title { font-size: 28px; font-weight: 800; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-label { font-size: 11px; font-family: monospace; color: var(--text3); text-transform: uppercase; }
  .card-badge { font-size: 10px; font-family: monospace; padding: 3px 8px; border-radius: 4px; border: 1px solid; }
  .badge-active { color: var(--accent2); border-color: rgba(61,214,172,0.3); background: rgba(61,214,172,0.08); }
  .badge-warn { color: var(--accent3); border-color: rgba(247,162,106,0.3); background: rgba(247,162,106,0.08); }

  .db-value { font-size: 54px; font-family: monospace; font-weight: 700; line-height: 1; }
  
  .metrics-row-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 16px 0; }
  .metric-subbox { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; text-align: center; }
  .metric-subbox .m-lbl { font-size: 9px; font-family: monospace; color: var(--text3); text-transform: uppercase; }
  .metric-subbox .m-val { font-size: 13px; font-family: monospace; font-weight: 700; margin-top: 4px; }

  .map-container { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); height: 220px; margin: 16px 0; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #native-svg-route { width: 100%; height: 100%; background: #151522; }

  .feedback-box { background: rgba(124,106,247,0.06); border: 1px solid rgba(124,106,247,0.2); border-radius: var(--radius-sm); padding: 14px; margin: 16px 0; display: none; }
  .feedback-title { font-size: 13px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .feedback-text { font-size: 12px; font-family: monospace; color: var(--text2); line-height: 1.5; }

  .ride-btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .ride-btn { padding: 16px; border: none; border-radius: var(--radius-sm); font-weight: 600; font-size: 15px; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
  .btn-start { background: var(--accent2); color: #0a0a0f; }
  .btn-stop { background: var(--danger); color: #fff; }
  .btn-play { background: #7c6af7; color: #fff; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">Bumpy Ride Telemetry</div>
    <div class="title">Sürüş Analitiği v6.0</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-label" id="panel-label">Anlık Telemetri</div>
      <div class="card-badge badge-warn" id="ride-badge">Hazır</div>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
      <div class="db-value" id="ride-value">0.00</div>
      <div style="font-size: 11px; color: var(--text3); font-family: monospace" id="ride-peak-label">Tepe Noktası: 0.00 G</div>
    </div>
    <div style="font-size: 11px; font-family: monospace; color: var(--text3); margin-top: 4px;">3-Eksen Bileşke Sarsıntı İvmesi</div>
    
    <div class="metrics-row-triple">
      <div class="metric-subbox">
        <div class="m-lbl">Mesafe</div>
        <div class="m-val" id="metric-distance">0 m</div>
      </div>
      <div class="metric-subbox">
        <div class="m-lbl" id="speed-label-type">Mevcut Hız</div>
        <div class="m-val" id="metric-speed" style="color: var(--accent2);">0 km/s</div>
      </div>
      <div class="metric-subbox">
        <div class="m-lbl">Sürüş Süresi</div>
        <div class="m-val" id="metric-duration">00:00:00</div>
      </div>
    </div>

    <div class="map-container">
      <svg id="native-svg-route" viewBox="0 0 200 200">
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        <polyline id="svg-polyline" points="" fill="none" stroke="#f74a6a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <circle id="svg-marker" cx="100" cy="100" r="5" fill="#3dd6ac" style="display:none;" />
      </svg>
    </div>

    <div class="feedback-box" id="ride-feedback">
      <div class="feedback-title">
        <span>📋 Sürüş Konfor Raporu</span>
        <span id="feedback-score" style="color: var(--accent3); font-family: monospace; font-weight: bold;">Skor: --</span>
      </div>
      <div class="feedback-text" id="feedback-text">Analiz bekleniyor...</div>
    </div>

    <div id="ride-label" style="text-align: center; font-size: 12px; font-family: monospace; color: var(--text2); margin-bottom: 16px;">Sürüşü başlat butonuna basarak izinleri onaylayın.</div>

    <div class="ride-btn-group">
      <button class="ride-btn btn-start" id="btn-ride-toggle">Sürüşü Başlat</button>
    </div>
  </div>
</div>

<script>
// Global Durum Yönetimi
let currentAppFlowState = 'ready'; 
let driveSessionData = [];

// Zamanlayıcılar ve Takip ID'leri
let watchId = null;
let rideStartTime = null;
let durationTimer = null;
let currentSpeedKmh = 0;

// İvme Havuzu
let sessionMaxG = 0;
let sessionTotalG = 0;
let sessionCount = 0;

// SVG Harita Hesaplama Sınırları
let minLat = null, maxLat = null, minLon = null, maxLon = null;

window.addEventListener('DOMContentLoaded', () => {
  // İlk yüklemede sensör dinleyicisini doğrudan bağla (Destekleyen tarayıcılar için)
  window.addEventListener('devicemotion', calculateMotionStream, true);

  // Ana Tetikleyici Buton Dinleyicisi
  document.getElementById('btn-ride-toggle').addEventListener('click', handleMainButtonClick);
});

// 3 EKSENLİ BİLEŞKE İVME HESAPLAMA MOTORU
function calculateMotionStream(e) {
  if (currentAppFlowState === 'playing') return;

  let acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;

  let x = acc.x || 0;
  let y = acc.y || 0;
  let z = acc.z || 0;

  let totalForce = Math.sqrt(x*x + y*y + z*z);
  let gForce = totalForce / 9.80665;
  let netG = Math.abs(gForce - 1.0);
  
  if (netG < 0.06) netG = 0;
  if (netG > 3.0) netG = 3.0;

  document.getElementById('ride-value').textContent = netG.toFixed(2);
  
  if (currentAppFlowState === 'recording') {
    sessionTotalG += netG;
    sessionCount++;
    
    if (netG > sessionMaxG) {
      sessionMaxG = netG;
      document.getElementById('ride-peak-label').textContent = `Tepe Noktası: ${sessionMaxG.toFixed(2)} G`;
    }
  }
}

function handleMainButtonClick() {
  const btn = document.getElementById('btn-ride-toggle');

  if (currentAppFlowState === 'ready') {
    // KULLANICI ETKİLEŞİM ANINDA İZİNLERİ KESİN OLARAK TETİKLE
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(permissionState => {
          if (permissionState === 'granted') {
            window.addEventListener('devicemotion', calculateMotionStream, true);
          }
        })
        .catch(err => console.log("Sensör izin talebi atlandı veya reddedildi."));
    }

    // Durumu Kayıt Moduna Al
    currentAppFlowState = 'recording';
    driveSessionData = []; sessionMaxG = 0; sessionTotalG = 0; sessionCount = 0; currentSpeedKmh = 0;
    minLat = null; maxLat = null; minLon = null; maxLon = null;
    rideStartTime = Date.now();
    
    document.getElementById('ride-feedback').style.display = 'none';
    document.getElementById('speed-label-type').textContent = 'Mevcut Hız';
    document.getElementById('metric-speed').style.color = 'var(--accent2)';
    document.getElementById('ride-badge').textContent = 'CANLI TAKİP'; 
    document.getElementById('ride-badge').className = 'card-badge badge-active';
    document.getElementById('ride-label').textContent = 'Sürüş kaydediliyor. Yol sarsıntıları takipte...';
    
    document.getElementById('svg-polyline').setAttribute('points', '');
    document.getElementById('svg-marker').style.display = 'none';

    btn.textContent = 'Sürüşü Bitir ve Raporla'; 
    btn.className = 'ride-btn btn-stop';

    // Süre Sayacını Başlat
    durationTimer = setInterval(() => {
      document.getElementById('metric-duration').textContent = formatTime(Date.now() - rideStartTime);
    }, 1000);

    // Geolocation (GPS) Takibini Başlat ve İzin İste
    if (navigator.geolocation) {
      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          if (currentAppFlowState !== 'recording') return;
          
          let lat = pos.coords.latitude;
          let lon = pos.coords.longitude;
          
          if (pos.coords.speed !== null && pos.coords.speed >= 0) {
            currentSpeedKmh = Math.round(pos.coords.speed * 3.6);
          } else if (driveSessionData.length > 0) {
            let prev = driveSessionData[driveSessionData.length - 1];
            let dist = computeHaversineDistance(prev.lat, prev.lon, lat, lon);
            let timeDiffSec = (Date.now() - prev.timestamp) / 1000;
            if (timeDiffSec > 0) currentSpeedKmh = Math.round((dist / timeDiffSec) * 3.6);
          }
          
          document.getElementById('metric-speed').textContent = `${currentSpeedKmh} km/s`;
          let currentNetG = parseFloat(document.getElementById('ride-value').textContent) || 0;
          
          driveSessionData.push({ lat, lon, speed: currentSpeedKmh, gForce: currentNetG, timestamp: Date.now() });
          
          updateNativeSVGMap();
          calculateTotalDistanceUI();
        },
        (err) => {
          console.warn("GPS İzin veya Sinyal Hatası:", err.message);
          document.getElementById('ride-label').textContent = "GPS Sinyali bekleniyor (Açık alana çıkın)...";
        }, 
        { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
      );
    } else {
      document.getElementById('ride-label').textContent = "Cihazda GPS desteği bulunamadı.";
    }
  } 
  else if (currentAppFlowState === 'recording') {
    currentAppFlowState = 'summary';
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (durationTimer) { clearInterval(durationTimer); durationTimer = null; }
    
    document.getElementById('ride-badge').textContent = 'BİTTİ'; 
    document.getElementById('ride-badge').className = 'card-badge badge-warn';
    document.getElementById('ride-label').textContent = 'Sürüş sonlandırıldı. Konfor analizi hesaplandı.';
    
    // Eğer test için evde basıldıysa simülasyon verisi yükle
    if (driveSessionData.length < 2) {
      injectMockupRouteForTesting();
    }

    buildRideComfortReport();

    btn.textContent = '▶ Sürüş Güzergahını Tekrar Oynat'; 
    btn.className = 'ride-btn btn-play';
  } 
  else if (currentAppFlowState === 'summary') {
    currentAppFlowState = 'playing';
    btn.textContent = '🔄 Sistemi Yeniden Başlat'; 
    btn.className = 'ride-btn btn-start';
    startNativeAnimatedPlayback();
  }
  else if (currentAppFlowState === 'playing') {
    restartApp();
  }
}

// NATIVE SVG HARİTA İŞLEME KATMANI
function updateNativeSVGMap() {
  if (driveSessionData.length === 0) return;

  let lats = driveSessionData.map(p => p.lat);
  let lons = driveSessionData.map(p => p.lon);
  
  minLat = Math.min(...lats); maxLat = Math.max(...lats);
  minLon = Math.min(...lons); maxLon = Math.max(...lons);

  let latRange = maxLat - minLat || 0.001;
  let lonRange = maxLon - minLon || 0.001;

  let pointsAttr = "";
  driveSessionData.forEach(p => {
    let x = 20 + ((p.lon - minLon) / lonRange) * 160;
    let y = 180 - ((p.lat - minLat) / latRange) * 160; 
    pointsAttr += `${x},${y} `;
  });

  document.getElementById('svg-polyline').setAttribute('points', pointsAttr.trim());

  if (driveSessionData.length > 0) {
    let last = driveSessionData[driveSessionData.length - 1];
    let markerX = 20 + ((last.lon - minLon) / lonRange) * 160;
    let markerY = 180 - ((last.lat - minLat) / latRange) * 160;
    
    const marker = document.getElementById('svg-marker');
    marker.setAttribute('cx', markerX);
    marker.setAttribute('cy', markerY);
    marker.style.display = 'block';
  }
}

// S SÜRÜŞ KONFOR ALGORİTMASI
function buildRideComfortReport() {
  const feedbackBox = document.getElementById('ride-feedback');
  const scoreEl = document.getElementById('feedback-score');
  const textEl = document.getElementById('feedback-text');
  
  let avgG = sessionCount > 0 ? (sessionTotalG / sessionCount) : 0.02;
  let comfortScore = 100 - (avgG * 150) - (sessionMaxG * 30);
  comfortScore = Math.max(5, Math.min(100, Math.round(comfortScore)));

  scoreEl.textContent = `%${comfortScore}`;
  feedbackBox.style.display = 'block';

  let distanceStr = document.getElementById('metric-distance').textContent;
  let durationStr = document.getElementById('metric-duration').textContent;
  let reportSummary = `Mesafe: ${distanceStr} | Süre: ${durationStr} | En Büyük Şok Darbesi: ${sessionMaxG.toFixed(2)} G. `;

  if (comfortScore >= 85) {
    textEl.textContent = reportSummary + "Mükemmel Konfor! Süspansiyon emilimi harika çalıştı.";
  } else if (comfortScore >= 68) {
    textEl.textContent = reportSummary + "Standart Konfor. Rutin asfalt dalgalanmaları ve bağlantı elemanları geçişi.";
  } else if (comfortScore >= 45) {
    textEl.textContent = reportSummary + "⚠️ Düşük Konfor! Bozuk satıhlar veya sert amortisör tepkileri saptandı.";
  } else {
    textEl.textContent = reportSummary + "🚨 Kritik Yol Koşulu! Yoğun çukurlar, parke taşları veya agresif tümsekler birleşik ivmeyi fırlattı.";
  }
}

// ANIMATED REPLAY MOTORU
let playbackIdx = 0;
let playbackTimer = null;

function startNativeAnimatedPlayback() {
  if (driveSessionData.length === 0) return;
  
  playbackIdx = 0;
  document.getElementById('panel-label').textContent = 'GÜZERGAH TEKRARI';
  document.getElementById('speed-label-type').textContent = 'Anlık Sürat';
  
  let latRange = maxLat - minLat || 0.001;
  let lonRange = maxLon - minLon || 0.001;

  document.getElementById('svg-polyline').setAttribute('points', '');
  let currentPointsStr = "";

  if (playbackTimer) clearInterval(playbackTimer);
  
  playbackTimer = setInterval(() => {
    if (playbackIdx >= driveSessionData.length) {
      clearInterval(playbackTimer);
      document.getElementById('panel-label').textContent = 'TEKRAR BİTTİ';
      return;
    }
    
    let p = driveSessionData[playbackIdx];
    let px = 20 + ((p.lon - minLon) / lonRange) * 160;
    let py = 180 - ((p.lat - minLat) / latRange) * 160;
    
    currentPointsStr += `${px},${py} `;
    document.getElementById('svg-polyline').setAttribute('points', currentPointsStr.trim());
    
    let marker = document.getElementById('svg-marker');
    marker.setAttribute('cx', px);
    marker.setAttribute('cy', py);
    
    document.getElementById('ride-value').textContent = p.gForce.toFixed(2);
    document.getElementById('metric-speed').textContent = `${p.speed} km/s`;
    
    playbackIdx++;
  }, 150);
}

function computeHaversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const phi1 = lat1 * Math.PI / 180; const phi2 = lat2 * Math.PI / 180;
  const dPhi = (lat2 - lat1) * Math.PI / 180; const dLam = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLam/2) * Math.sin(dLam/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function calculateTotalDistanceUI() {
  if (driveSessionData.length < 2) return;
  let total = 0;
  for(let i=1; i<driveSessionData.length; i++) {
    total += computeHaversineDistance(driveSessionData[i-1].lat, driveSessionData[i-1].lon, driveSessionData[i].lat, driveSessionData[i].lon);
  }
  document.getElementById('metric-distance').textContent = total >= 1000 ? `${(total/1000).toFixed(2)} km` : `${Math.round(total)} m`;
}

function formatTime(ms) {
  let totalSecs = Math.floor(ms / 1000);
  let hrs = Math.floor(totalSecs / 3600);
  let mins = Math.floor((totalSecs % 3600) / 60);
  let secs = totalSecs % 60;
  return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

function injectMockupRouteForTesting() {
  let baseLat = 39.9208;
  let baseLon = 32.8541;
  driveSessionData = [];
  for (let i = 0; i < 40; i++) {
    let lat = baseLat + (i * 0.00012);
    let lon = baseLon + (Math.sin(i * 0.5) * 0.00008);
    let speed = Math.round(40 + Math.sin(i) * 15);
    let mockG = i % 7 === 0 ? 0.74 : (i % 4 === 0 ? 0.28 : 0.02);
    driveSessionData.push({ lat, lon, speed, gForce: mockG, timestamp: Date.now() });
    
    sessionTotalG += mockG;
    sessionCount++;
    if (mockG > sessionMaxG) sessionMaxG = mockG;
  }
  document.getElementById('ride-peak-label').textContent = `Tepe Noktası: ${sessionMaxG.toFixed(2)} G`;
  updateNativeSVGMap();
  calculateTotalDistanceUI();
}

function restartApp() {
  currentAppFlowState = 'ready';
  if (playbackTimer) clearInterval(playbackTimer);
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (durationTimer) { clearInterval(durationTimer); durationTimer = null; }
  
  document.getElementById('ride-feedback').style.display = 'none';
  document.getElementById('panel-label').textContent = 'Anlık Telemetri';
  document.getElementById('speed-label-type').textContent = 'Mevcut Hız';
  document.getElementById('metric-speed').style.color = 'var(--accent2)';
  document.getElementById('metric-speed').textContent = '0 km/s';
  document.getElementById('ride-badge').textContent = 'Hazır';
  document.getElementById('ride-badge').className = 'card-badge badge-warn';
  
  document.getElementById('svg-polyline').setAttribute('points', '');
  document.getElementById('svg-marker').style.display = 'none';

  const mainBtn = document.getElementById('btn-ride-toggle');
  mainBtn.textContent = 'Sürüşü Başlat';
  mainBtn.className = 'ride-btn btn-start';

  document.getElementById('ride-peak-label').textContent = `Tepe Noktası: 0.00 G`;
  document.getElementById('ride-value').textContent = '0.00';
  document.getElementById('metric-distance').textContent = '0 m';
  document.getElementById('metric-duration').textContent = '00:00:00';
}
</script>
</body>
</html>
