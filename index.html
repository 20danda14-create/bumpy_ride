<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bumpy Ride — Sürüş Analitiği</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #3dd6ac;
    --accent3: #f7a26a;
    --text: #f0eeff;
    --text2: rgba(240,238,255,0.55);
    --text3: rgba(240,238,255,0.3);
    --danger: #f74a6a;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* --- INTRO SCREEN --- */
  #intro-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  #intro-screen::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.3;
    animation: scanRadar 2s linear infinite;
    top: 0;
  }

  @keyframes scanRadar {
    0% { top: 0%; }
    100% { top: 100%; }
  }

  .intro-logo-wrap {
    animation: introBumpy 0.8s ease-out infinite alternate;
    margin-bottom: 24px;
  }

  @keyframes introBumpy {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-6px) scale(1.02) skewX(-1deg); }
  }

  .intro-title {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .intro-subtitle {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 10px;
    text-align: center;
    opacity: 0.8;
  }

  .intro-loader-container {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin-top: 40px;
    position: relative;
    overflow: hidden;
  }

  .intro-loader-bar {
    position: absolute;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    animation: fillLoader 2.0s cubic-bezier(0.1, 0.85, 0.25, 1) forwards;
  }

  @keyframes fillLoader {
    0% { width: 0%; }
    100% { width: 100%; }
  }

  .intro-status {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* --- SELECTION SCREEN --- */
  #selection-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .select-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .select-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; }
  .select-desc { font-size: 13px; color: var(--text2); margin-bottom: 24px; font-family: var(--sans); }
  .vehicle-options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; }
  .option-box {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .option-box:hover { border-color: rgba(124,106,247,0.5); transform: translateY(-2px); }
  .option-box.selected { border-color: var(--accent); background: rgba(124,106,247,0.05); }
  .option-svg { width: 100px; height: 50px; margin-bottom: 12px; pointer-events: none; }
  .option-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .option-desc { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-top: 4px; }

  /* Setup/Permission Screen */
  #permission-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .perm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .perm-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(124,106,247,0.12);
    border: 1px solid rgba(124,106,247,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }

  .perm-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .perm-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 24px; font-family: var(--mono); }

  .perm-notice-box {
    background: rgba(61,214,172,0.05);
    border: 1px solid rgba(61,214,172,0.15);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 12px;
    color: var(--accent2);
    text-align: left;
    margin-bottom: 24px;
    font-family: var(--mono);
    line-height: 1.5;
  }

  .perm-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .perm-btn:hover { opacity: 0.88; }

  /* APP MAIN */
  .app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .title {
    font-size: 30px;
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Dashboard Cards */
  .grid { display: grid; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
  .card-badge { font-size: 10px; font-family: var(--mono); padding: 3px 8px; border-radius: 4px; border: 1px solid; }

  .badge-active { color: var(--accent2); border-color: rgba(61,214,172,0.3); background: rgba(61,214,172,0.08); }
  .badge-warn { color: var(--accent3); border-color: rgba(247,162,106,0.3); background: rgba(247,162,106,0.08); }
  .badge-playback { color: #7c6af7; border-color: rgba(124,106,247,0.3); background: rgba(124,106,247,0.08); animation: pulse 1.5s infinite; }

  .db-value { font-size: 60px; font-family: var(--mono); font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .db-unit { font-size: 12px; font-family: var(--mono); color: var(--text3); margin-bottom: 16px; }

  /* Additional Metrics UI Box */
  .metrics-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .metric-subbox {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
  }
  .metric-subbox .m-lbl { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
  .metric-subbox .m-val { font-size: 18px; font-family: var(--mono); font-weight: 700; color: var(--text); }

  /* Vehicle Visualizer */
  .vehicle-container {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    margin: 12px 0;
    border: 1px solid rgba(255,255,255,0.03);
  }

  .vehicle-svg-wrap {
    width: 140px;
    height: 60px;
    transition: transform 0.05s ease-out;
    transform-origin: center center;
  }
  .vehicle-svg-wrap svg { width: 100%; height: 100%; }

  /* --- PLAYBACK COMPONENT ARCHITECTURE --- */
  .playback-wrapper {
    margin-top: 16px;
  }
  .btn-trigger-playback-init {
    width: 100%; padding: 14px; background: rgba(124, 106, 247, 0.12); border: 1px solid rgba(124, 106, 247, 0.3); color: #fff; font-family: var(--sans); font-weight: 600; font-size: 14px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; display: none; text-align: center;
  }
  .btn-trigger-playback-init:hover { background: rgba(124, 106, 247, 0.22); border-color: var(--accent); }

  /* Dynamic Custom Map Canvas Area */
  .map-container {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    height: 220px;
    position: relative;
    overflow: hidden;
    
    /* Smooth animated expansion */
    display: block;
    max-height: 0px;
    opacity: 0;
    border-color: transparent;
    transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, border-color 0.5s ease;
  }
  .map-container.visible {
    max-height: 220px;
    opacity: 1;
    border-color: var(--border);
    margin-top: 16px;
    margin-bottom: 12px;
  }
  #map-canvas { width: 100%; height: 100%; display: block; }
  
  .map-overlay-title {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(10,10,15,0.85);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text2);
    border: 1px solid var(--border);
    pointer-events: none;
    z-index: 10;
  }

  .playback-controls { display: none; grid-template-columns: 2fr 1fr; gap: 8px; margin-bottom: 16px; }
  .pbc-btn { padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; color: #fff; transition: all 0.2s; text-align: center; }
  .btn-pbc-play { background: var(--accent); border-color: rgba(124, 106, 247, 0.3); }
  .btn-pbc-play:hover { background: #6854ed; }
  .btn-pbc-pause { background: var(--danger); border-color: rgba(247, 74, 106, 0.3); }
  .btn-pbc-pause:hover { background: #e03b5a; }
  .btn-pbc-reset { background: transparent; }
  .btn-pbc-reset:hover { background: rgba(255,255,255,0.03); border-color: var(--text3); }

  .feedback-box { background: rgba(124,106,247,0.06); border: 1px solid rgba(124,106,247,0.2); border-radius: var(--radius-sm); padding: 14px; margin-top: 16px; display: none; }
  .feedback-title { font-size: 13px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .feedback-text { font-size: 12px; font-family: var(--mono); color: var(--text2); line-height: 1.5; }

  .ride-btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 16px; }
  .ride-btn { padding
