<!DOCTYPE html>
<html lang="tr">
<head>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #3dd6ac;
    --accent3: #f7a26a;
    --text: #f0eeff;
    --text2: rgba(240,238,255,0.55);
    --text3: rgba(240,238,255,0.3);
    --danger: #f74a6a;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* --- SELECTION SCREEN --- */
  #selection-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }
  .select-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    max-width: 460px;
    width: 100%;
    text-align: center;
  }
  .select-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.02em; }
  .select-desc { font-size: 13px; color: var(--text2); margin-bottom: 16px; font-family: monospace; }
  
  .section-divider {
    font-family: monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin: 20px 0 12px 0;
    text-align: left;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 4px;
  }

  .vehicle-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .option-box {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .option-box.selected { border-color: var(--accent); background: rgba(124,106,247,0.05); }
  .option-svg { width: 80px; height: 40px; margin-bottom: 8px; pointer-events: none; }
  .option-name { font-size: 13px; font-weight: 700; color: var(--text); }

  .perm-notice-box {
    background: rgba(61,214,172,0.04);
    border: 1px solid rgba(61,214,172,0.12);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 11px;
    color: var(--accent2);
    text-align: left;
    margin-top: 20px;
    font-family: monospace;
    line-height: 1.4;
  }

  .perm-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s ease;
  }
  .perm-btn:hover { background: #6552ea; }

  /* --- APP MAIN --- */
  .app {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
