<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bumpy Ride — Elegan Sürüş Analitiği</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --surface: #0d0d14;
    --surface2: #141420;
    --border: rgba(255,255,255,0.06);
    --accent: #6d5dfc;
    --accent2: #2ecc71;
    --accent3: #e67e22;
    --text: #f4f4f9;
    --text2: rgba(244,244,249,0.6);
    --text3: rgba(244,244,249,0.3);
    --danger: #e74c3c;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 20px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(109,93,252,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(109,93,252,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* --- INTRO SCREEN --- */
  #intro-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .intro-logo-wrap {
    animation: introPulse 1.5s ease-in-out infinite alternate;
    margin-bottom: 24px;
    text-align: center;
  }

  @keyframes introPulse {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(-4px); opacity: 1; }
  }

  .intro-title {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .intro-subtitle {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent2);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 12px;
  }

  .intro-loader-container {
    width: 160px;
    height: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 1px;
    margin-top: 32px;
    position: relative;
    overflow: hidden;
  }

  .intro-loader-bar {
    position: absolute;
    height: 100%; width: 0%;
    background: var(--accent);
    animation: fillLoader 1.8s cubic-bezier(0.1, 0.85, 0.25, 1) forwards;
  }

  @keyframes fillLoader { 0% { width: 0%; } 100% { width: 100%; } }

  /* --- PERMISSION SCREEN --- */
  #permission-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .perm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .perm-icon {
    font-size: 32px; margin-bottom: 20px; opacity: 0.9;
  }

  .perm-title { font-size: 24px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.01em; }
  .perm-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 24px; }

  .perm-notice-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 11px;
    color: var(--text2);
    text-align: left;
    margin-bottom: 24px;
    font-family: var(--mono);
    line-height: 1.6;
  }
