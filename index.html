<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #3dd6ac;
    --accent3: #f7a26a;
    --text: #f0eeff;
    --text2: rgba(240,238,255,0.55);
    --text3: rgba(240,238,255,0.3);
    --danger: #f74a6a;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

  /* --- CONFIGURATION HUB --- */
  #selection-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .select-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 20px; max-width: 460px; width: 100%; text-align: center; }
  .select-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .select-desc { font-size: 13px; color: var(--text2); margin-bottom: 16px; font-family: monospace; }
  
  .section-divider { font-family: monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin: 20px 0 12px 0; text-align: left; border-bottom: 1px dashed var(--border); padding-bottom: 4px; }
  .vehicle-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .option-box { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; user-select: none; }
  .option-box.selected { border-color: var(--accent); background: rgba(124,106,247,0.07); }
  .option-name { font-size: 13px; font-weight: 700; margin-top: 6px; pointer-events: none; }

  .perm-notice-box { background: rgba(247,162,106,0.04); border: 1px solid rgba(247,162,106,0.15); border-radius: var(--radius-sm); padding: 12px; font-size: 11px; color: var(--accent3); text-align: left; margin-top: 20px; font-family: monospace; line-height: 1.4; }
  .perm-btn { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; }

  /* --- APP MAIN --- */
  .app { max-width: 520px; margin: 0 auto; padding: 24px 16px 48px; }
  .header { text-align: center; margin-bottom: 24px; }
  .logo { font-size: 11px; font-family: monospace; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; }
  .title { font-size: 30px; font-weight: 800; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-label { font-size: 11px; font-family: monospace; color: var(--text3); text-transform: uppercase; }
